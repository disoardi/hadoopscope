version: "3.8"

# HadoopScope — Integration test environment
# Avvia il mock API server e lancia i test di integrazione.
#
# Usage:
#   docker compose up --build --abort-on-container-exit
#   docker compose run hadoopscope --config /app/config/test.yaml --env mock-hdp --dry-run
#
# Secrets management in Docker:
#   docker compose run -e AMBARI_PASS=secret hadoopscope ...
#   docker compose run -v /run/secrets:/run/secrets hadoopscope ...

services:

  # Mock API server — simula Ambari, YARN, WebHDFS, Cloudera Manager
  mock-api:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "18080:8080"
    environment:
      - SCENARIO=ok
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/clusters/test-cluster/services')"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 2s

  # HadoopScope — dry-run contro il mock server (scenario ok)
  hadoopscope:
    build:
      context: .
    depends_on:
      mock-api:
        condition: service_healthy
    environment:
      # Secrets tramite variabili d'ambiente (opzione 1)
      - AMBARI_PASS=docker-test-pass
    command:
      - --config
      - /app/config/docker-test.yaml
      - --env
      - mock-hdp
      - --checks
      - all
      - --dry-run
      - --output
      - text

  # Mock server scenario critical (per test di alerting)
  mock-api-critical:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "18081:8080"
    environment:
      - SCENARIO=critical
    profiles:
      - critical

  # Test runner — lancia tutti i test pytest/unittest
  # entrypoint: [] sovrascrive ENTRYPOINT del Dockerfile (python3 hadoopscope.py)
  test-runner:
    build:
      context: .
    depends_on:
      mock-api:
        condition: service_healthy
    volumes:
      - .:/app:ro
    working_dir: /app
    entrypoint: ["python3"]
    environment:
      - HADOOPSCOPE_TEST_API_URL=http://mock-api:8080
      # Test per secrets via env var
      - HS_DOCKER_TEST_SECRET=docker_secret_value
    command: ["tests/run_all.py"]
