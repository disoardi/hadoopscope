# HadoopScope — Example Config
# Copia in config/hadoopscope.yaml e adatta al tuo ambiente.
# IMPORTANTE: non committare questo file con credenziali reali!
# Usa variabili d'ambiente: ambari_pass: "${AMBARI_PASS}"

version: "1"

environments:
  prod-hdp:
    type: hdp
    enabled: true
    ambari_url: https://ambari.corp.com:8080
    ambari_user: admin
    ambari_pass: "${AMBARI_PASS}"
    cluster_name: prod-cluster
    ambari_api_version: "v1"

    webhdfs:
      url: http://namenode.corp.com:9870
      user: hdfs
      ssl: false

    # ---------------------------------------------------------------------------
    # Kerberos (SPNEGO) — richiede kinit + curl nel PATH
    # ---------------------------------------------------------------------------
    # HadoopScope usa kinit per rinnovare il ticket all'avvio, poi curl --negotiate
    # per tutte le chiamate WebHDFS (GETCONTENTSUMMARY, JMX, CREATE, DELETE).
    # Ambari usa sempre Basic Auth (user/pass) anche in ambienti kerberizzati.
    #
    # Prerequisiti sul nodo che esegue HadoopScope:
    #   - kinit/klist installati  (krb5-user su Debian, krb5-workstation su RHEL)
    #   - curl installato
    #   - /etc/krb5.conf configurato con il realm corretto
    #   - keytab leggibile dall'utente che esegue hadoopscope
    #
    # Keytab — opzioni:
    #   keytab: /etc/security/keytabs/monitor.keytab      # path diretto
    #   keytab: "${KEYTAB_PATH}"                           # da variabile d'ambiente
    #   keytab: "${file:/run/secrets/monitor.keytab}"      # da Docker/k8s secret
    kerberos:
      enabled: false
      # enabled: true
      # keytab: "${KEYTAB_PATH}"       # path assoluto al keytab
      # principal: monitor@CORP.COM    # principal del keytab (es. hdfs/namenode.corp.com@CORP.COM)

    # ---------------------------------------------------------------------------
    # YARN Resource Manager URL
    # ---------------------------------------------------------------------------
    # Se il YARN RM è su un host diverso da Ambari, specifica l'URL esplicitamente.
    # Se omesso, HadoopScope prova a costruirlo da ambari_url:8088 (spesso sbagliato).
    yarn:
      rm_url: http://yarn-rm.corp.com:8088

    # ---------------------------------------------------------------------------
    # HTTP Proxy bypass
    # ---------------------------------------------------------------------------
    # Se il nodo che esegue HadoopScope ha HTTP_PROXY/HTTPS_PROXY configurati
    # (tipico in ambienti corporate), le chiamate ai cluster interni vengono
    # bloccate dal proxy con HTTP 403/URLBlocked.
    # Imposta no_proxy: true per bypassare il proxy per questo environment.
    # Equivalente a: export no_proxy="*" solo per queste chiamate.
    no_proxy: false
    # no_proxy: true   # abilita se ottieni "HTTP 403: URLBlocked" o "connection refused"

    ansible:
      edge_host: edge01.corp.com
      ssh_user: monitor
      ssh_key: ~/.ssh/monitor_key
      become: false

checks:
  service_health:
    enabled: true
    services: [HDFS, YARN, HIVE, HBASE, OOZIE, ZOOKEEPER]
    alert_on: [CRITICAL, WARNING]

  namenode_ha:
    enabled: true
    # ha_enabled: true   # Ambari 2.6.x non espone ha_state → imposta true se il cluster
    #                    # ha HA attiva, per avere OK invece di WARNING

  hdfs_space:
    enabled: true
    paths:
      - path: /user/hive/warehouse
        warning_pct: 75
        critical_pct: 90
      - path: /tmp
        warning_pct: 80
        critical_pct: 95

  hdfs_writability:
    enabled: true
    test_path: /tmp/.hadoopscope-probe

  hdfs_dead_datanodes:
    enabled: true
    warning_threshold: 1
    critical_threshold: 3

  small_files:
    enabled: true
    paths: [/user/hive/warehouse]
    threshold_avg_mb: 128

  hive_partitions:
    enabled: true
    databases: [default]
    warning_threshold: 5000
    critical_threshold: 10000

alerts:
  email:
    enabled: false
    smtp_host: smtp.corp.com
    smtp_port: 587
    smtp_tls: true
    from_addr: hadoopscope@corp.com
    to:
      - hadoop-ops@corp.com
    on_severity: [WARNING, CRITICAL]

  zabbix:
    enabled: false
    server: zabbix.corp.com
    host: hadoop-monitor

  log:
    enabled: true
    path: /tmp/hadoopscope-logs/
    format: text
    rotate_days: 30

output:
  format: text
  verbosity: normal
  color: true
